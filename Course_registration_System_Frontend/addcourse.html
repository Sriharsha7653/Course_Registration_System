<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Course</title>
    <style>
        body {
            background-color: black;
            text-align: center;
        }

        form {
            margin: auto;
            padding: 20px;
            width: 400px;
            background-color: #fff;
        }

        input,
        select,
        button {
            width: 90%;
            padding: 10px;
            margin: 10px;
        }

        button {
            background-color: #af4c82;
            color: white;
            font-weight: bold;
            font-size: medium;
            cursor: pointer;
        }

        button:hover {
            background-color: #104212;
        }

        h1:hover {
            color: #2bff00a2 !important;
        }
    </style>

</head>

<body>

    <form action="http://localhost:8080/course/addcourse" method="post">

        <label>Enter the Course Id</label>
        <input type="text" name="courseId"><br><br>

        <label>Enter the Course Name</label>
        <input type="text" name="courseName"><br><br>

        <label>Enter the Trainer Name</label>
        <input type="text" name="trainer"><br><br>

        <label>Enter the Duration</label>
        <input type="number" name="durationInWeeks"><br><br>

        <button type="submit">Submit</button>
    </form>


</body>

</html>
